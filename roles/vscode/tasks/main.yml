---
- name: List installed VS Code extensions
  ansible.builtin.command: code --list-extensions
  register: installed_extensions
  changed_when: false
  failed_when: false

- name: Install VS Code extensions
  ansible.builtin.command: "code --install-extension {{ item }}"
  loop: "{{ vscode_extensions }}"
  when:
    - installed_extensions.rc == 0
    - item not in installed_extensions.stdout_lines
  changed_when: true

- name: Ensure VS Code user config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/Library/Application Support/Code/User"
    state: directory
    mode: '0755'

- name: Symlink VS Code config files from ~/.config/vscode
  ansible.builtin.file:
    src: "{{ ansible_env.HOME }}/.config/vscode/{{ item }}"
    dest: "{{ ansible_env.HOME }}/Library/Application Support/Code/User/{{ item }}"
    state: link
    force: true
  loop: "{{ vscode_config_files }}"
